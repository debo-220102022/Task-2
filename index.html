<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Navbar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="menu">
      <div class="logo">
        <a href="#">Infra Tech</a>
      </div>
      <ul>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Forum</a></li>
        <li><a href="#">Login</a></li>
      </ul>
      <div class="menu-icon" onclick="toggleMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" height="26" viewBox="0 96 960 960" width="26"><path d="M120 816v-60h720v60H120Zm0-210v-60h720v60H120Zm0-210v-60h720v60H120Z"/></svg>
      </div>
    </div>
  </nav>

  <div class="img home">
    <div class="center">
      <div class="title">Welcome to Infra Tech</div>
      <div class="sub_title">Your tech solutions</div>
      <div class="btns">
        <button>Learn More</button>
        <button>Contact Us</button>
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.querySelector('nav .menu ul');
      menu.classList.toggle('active');
    }
  </script>
</body>
</html>
